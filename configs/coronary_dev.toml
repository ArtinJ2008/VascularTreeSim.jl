# Coronary artery tree growth configuration — DEV (lightweight) variant.
# Purpose: fast end-to-end iteration (~5-10 min total) to validate the v4
# subdivision code path. Uses coarser domain + earlier growth stop + same 8 μm
# subdivision target so the fixes in growth_tree.jl (_relength_thin_segments!,
# max-anatomy Murray, clip_below_diameter_cm) are still exercised.
#
# Differences vs configs/coronary.toml (full-resolution v4):
#   [domain] voxel_spacing_cm 0.02 → 0.05, outer_samples / cavity_samples halved
#   [growth] target_p95_distance_cm 0.005 → 0.05
#            target_max_distance_cm 0.01 → 0.1
#            max_new_branches_per_tree 200000 → 5000
#            coverage_stride 4 → 12, graph_stride 12 → 36, frontier_batch 28 → 12
# All subdivision parameters kept identical to full config.

[organ]
name = "coronary"
nrb_path = "/home/molloi-lab/smb_mount/shared_drive/XCAT Phantom/xcat_adult_nrb_files/vmale50_heart.nrb"
phantom_path = "/home/molloi-lab/smb_mount/shared_drive/Shu Nie/PVAT_Analysis/digital phantoms/vmale50_1600x1400x500_8bit_little_endian_act_1.raw"
phantom_dims = [1600, 1400, 500]
coordinate_scale = 0.1  # XCAT NRB uses mm, we work in cm
embed_phantom_raw = false  # Step 5 phantom embed disabled (we only use the CSV output)

[surfaces]
outer = "dias_pericardium"
reference = "dias_aorta"
cavities = [
    "dias_lv_0",
    "dias_lv_1",
    "dias_lv_2",
    "dias_lv_3",
    "dias_lv_4",
    "dias_la",
    "dias_ra",
    "dias_rv",
    "dias_pul_art",
    "dias_aorta",
    "dias_sup_vc",
    "dias_inf_vc",
]

[[vessel_trees]]
name = "LAD"
surface_names = ["dias_lad1", "dias_lad2", "dias_lad3"]
color = "#1f77ff"
root_anchor_surface = "dias_aorta"
# target_flow_ml_min omitted → uniform 1:1:1 round-robin
root_diameter_override_cm = 0.37

[[vessel_trees]]
name = "LCX"
surface_names = ["dias_lcx"]
color = "#e3342f"
root_anchor_surface = "dias_aorta"
root_diameter_override_cm = 0.34

[[vessel_trees]]
name = "RCA"
surface_names = ["dias_rca1", "dias_rca2"]
color = "#22aa44"
root_anchor_surface = "dias_aorta"
root_diameter_override_cm = 0.39

[domain]
voxel_spacing_cm = 0.05         # DEV: coarser (full: 0.02)
outer_samples = [48, 36]        # DEV: halved (full: [96, 72])
cavity_samples = [28, 20]       # DEV: halved (full: [56, 40])
dilation_radius = 1
coarse_seed_cm = [14.085, 21.628, 26.966]   # Works for 0.05 cm voxels (was computed at that scale)

[growth]
mode = "continue_from_xcat"
effective_supply_radius_cm = 0.00125
capillary_diameter_cm = 0.0008
terminal_diameter_cm = 0.02            # 200 μm growth-phase terminal
subdivision_terminal_diameter_cm = 0.0006   # 6 μm (SAME as full; off Pries minimum onto capillary viscosity rise)
subdivision_clip_below_diameter_cm = 0.005  # SAME as full
subdivision_max_ld_ratio = 25.0             # SAME as full
max_new_branches_per_tree = 5000       # DEV: much smaller (full: 200000)
graph_neighbors = 16
min_frontier_separation_cm = 0.015
max_path_nodes = 20
frontier_batch = 12                    # DEV: smaller (full: 28)
murray_gamma = 3.0
max_segment_length_cm = 0.1
smooth_passes = 20
spline_density = 5
coverage_stride = 12                   # DEV: coarser (full: 4)
graph_stride = 36                      # DEV: coarser (full: 12)
graph_jitter_cm = 0.08
turn_penalty = 0.5
target_p95_distance_cm = 0.05          # DEV: relaxed 10× (full: 0.005)
target_max_distance_cm = 0.1           # DEV: relaxed 10× (full: 0.01)
